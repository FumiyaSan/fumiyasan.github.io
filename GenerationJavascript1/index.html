<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piadineria - Report Giornaliero</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fdfbfb, #ebedee);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
      transition: 0.2s;
    }

    input:focus {
      border-color: #e67e22;
      outline: none;
      box-shadow: 0 0 5px rgba(230,126,34,0.3);
    }

    .full {
      grid-column: span 2;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }

    .primary {
      background: linear-gradient(135deg, #e67e22, #f39c12);
      color: white;
    }

    .secondary {
      background: #ecf0f1;
    }

    .output {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 12px;
      font-size: 14px;
      white-space: pre-line;
      border: 1px solid #eee;
    }

    .badge {
      display: inline-block;
      background: #e67e22;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .logo {
      text-align:center;
      margin-bottom:10px;
    }

    .logo img {
      max-width:180px;
      height:auto;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo">
      <img src="./id7MDjbpS6_logos.png">
    </div>

    <h2>Report Giornaliero</h2>

    <div class="grid">
      <input type="number" id="piade" placeholder="Piade">
      <input type="number" id="rotoli" placeholder="Rotoli">

      <input type="number" id="insalate" placeholder="Insalate">
      <input type="number" id="baby" placeholder="Baby Nutella">

      <input type="number" id="limited" placeholder="Limited">
      <input type="number" id="patatine" placeholder="Patatine">

      <input type="number" id="menu" placeholder="Menu">
      <input type="number" id="trudi" placeholder="Trudi">

      <input type="number" id="fatturato" placeholder="Fatturato €" class="full">
      <input type="number" id="obiettivoFatturato" placeholder="Obiettivo €" class="full">
      <input type="number" id="scontrini" placeholder="Scontrini" class="full">
    </div>

    <button class="primary" onclick="generaReport()">Genera Report</button>
    <button class="secondary" onclick="copiaTesto()">📋 Copia testo</button>

    <div class="output" id="output"></div>
  </div>

  <script>
    function perc(parte, totale) {
      if (!totale || totale === 0) return 0;
      return ((parte / totale) * 100).toFixed(1);
    }

    function generaReport() {
      const piade = +document.getElementById('piade').value || 0;
      const rotoli = +document.getElementById('rotoli').value || 0;
      const insalate = +document.getElementById('insalate').value || 0;
      const baby = +document.getElementById('baby').value || 0;
      const limited = +document.getElementById('limited').value || 0;
      const patatine = +document.getElementById('patatine').value || 0;
      const menu = +document.getElementById('menu').value || 0;
      const trudi = +document.getElementById('trudi').value || 0;
      const fatturato = +document.getElementById('fatturato').value || 0;
      const obFatt = +document.getElementById('obiettivoFatturato').value || 0;
      const scontrini = +document.getElementById('scontrini').value || 0;

      const scontrinoMedio = scontrini ? (fatturato / scontrini).toFixed(2) : 0;

      const testo = `Via Tiburtina\n\npiade ${piade}\nrotoli ${rotoli} (${perc(rotoli, piade)}%)\nla Insalatona ${insalate}\nbaby nutella ${baby}\npiadina limited ${limited}\npatatine ${patatine} (${perc(patatine, piade)}%)\nmenu ${menu} (${perc(menu, piade)}%)\ntrudi ${trudi}\n\nobiettivo menu (37%)\n\nFatturato ${fatturato}€\nObiettivo fatturato ${obFatt}€\nObiettivo Scontrino medio 14,72€\nScontrino medio ${scontrinoMedio}€`;

      document.getElementById('output').innerText = testo;
    }

    function copiaTesto() {
      const testo = document.getElementById('output').innerText;
      if (!testo) return alert('Genera prima il report!');
      navigator.clipboard.writeText(testo).then(() => alert('Testo copiato!'));
    }
  </script>
</body>
</html>
